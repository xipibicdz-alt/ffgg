<style>
/* ===== الأساسيات ===== */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #0a0a0a; color: #e0e0e0; font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif; }
body { display: flex; flex-direction: column; position: relative; }

/* ===== إطار أزرق داكن ===== */
.fire-frame {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  border: 3px solid #004488;
  box-shadow: 0 0 15px rgba(0, 80, 180, 0.5), inset 0 0 10px rgba(0, 50, 130, 0.3);
  animation: blueGlow 2.5s ease-in-out infinite alternate;
}
@keyframes blueGlow {
  0% { border-color: #001f3d; box-shadow: 0 0 10px rgba(0, 50, 130, 0.4), inset 0 0 8px rgba(0, 30, 80, 0.2); }
  100% { border-color: #0066cc; box-shadow: 0 0 25px rgba(0, 110, 230, 0.7), inset 0 0 15px rgba(0, 70, 170, 0.4); }
}

/* ===== الشرر ===== */
.spark {
  position: absolute; bottom: -10px; width: 4px; height: 4px; background: #88ccff;
  border-radius: 50%; box-shadow: 0 0 6px #0077ff; pointer-events: none;
  opacity: 0; animation: rise 1.5s linear forwards; z-index: 1;
}
@keyframes rise {
  0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* ===== الكلمات التحفيزية ===== */
.floater {
  position: fixed; bottom: -30px; font-size: 14px; font-weight: 600; padding: 6px 12px;
  border-radius: 6px; pointer-events: none; z-index: 2; color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.6); border: 1px solid rgba(0, 100, 200, 0.2);
  animation: float linear forwards; direction: rtl; white-space: nowrap;
}
@keyframes float {
  0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; }
  90% { opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; }
}

/* ===== شريط التمرير الزجاجي ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(4px); border-radius: 10px; margin-block: 4px; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #0066cc, #00aaff, #00ddff); border-radius: 10px; box-shadow: inset 0 0 6px rgba(0,0,0,0.3), 0 0 8px rgba(0,136,255,0.5); border: 1px solid rgba(255,255,255,0.15); }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #0088ff, #00ccff, #66e6ff); box-shadow: 0 0 12px #0088ff; }
* { scrollbar-width: thin; scrollbar-color: #0088ff rgba(0,0,0,0.3); }

/* ===== حاوية التطبيق ===== */
.app-wrapper {
  position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column;
  overflow: hidden; background: transparent;
}

/* ---------- شاشة تسجيل الدخول ---------- */
.login-screen {
  position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center;

}

}
.login-card {

.login-header {

}

}
.login-header p {

}
.login-form {

}
.input-group {

}
.input-group label {

}
.input-field {

.input-field input {

}

.login-btn {

.main-app {

}

#fontBtn { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; border: 1px solid #555; color: #0099ff; cursor: pointer; font-size: 18px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
#fontBtn:hover, #fontBtn.active { transform: scale(1.1); border-color: #0077cc; box-shadow: 0 0 10px rgba(0,100,200,0.4); }

.font-panel.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.font-prev { background: rgba(0,0,0,0.4); border-radius: 6px; padding: 6px; text-align: center; color: #fff; min-height: 30px; border: 1px solid #333; margin-bottom: 6px; }

.gallery-header {

  margin-bottom: 16px; background: rgba(5,5,10,0.7); backdrop-filter: blur(10px);

}
.gallery-title {
  font-size: 24px; font-weight: 900; letter-spacing: 2px;
  background: linear-gradient(135deg, #0088ff, #00ccff, #66e6ff, #00aaff);
  -webkit-background-clip: text; background-clip: text; color: transparent;

  animation: titleGlow 2s ease-in-out infinite alternate;
}
@keyframes titleGlow {

.gallery-badge {
  background: rgba(0,100,200,0.15); border: 1px solid rgba(0,100,200,0.3);

}
.empty-state { text-align: center; padding: 60px 20px; }

.card {
  background: rgba(20,20,30,0.8); backdrop-filter: blur(8px);

}
.card-del {

  background: rgba(255,50,50,0.15); border: 1px solid rgba(255,80,80,0.5); color: #ff6666;
  display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px;
}
.fab-create {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: rgba(0, 102, 204, 0.25); backdrop-filter: blur(8px);
  border: 1px solid rgba(0, 136, 255, 0.4); border-radius: 40px; padding: 10px 20px;
  color: rgba(255, 255, 255, 0.9); font-weight: 600; font-size: 14px;
  display: flex; align-items: center; gap: 6px; cursor: pointer; z-index: 300;
  box-shadow: none; transition: background 0.2s, transform 0.2s;
}
.fab-create:active { transform: translateX(-50%) scale(0.96); background: rgba(0, 102, 204, 0.4); }

.viewer {
  position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.viewer.open { opacity: 1; pointer-events: all; }
.v-header {
  position: absolute; top: 0; left: 0; right: 0; padding: 16px; display: flex; align-items: center;
  justify-content: space-between; background: linear-gradient(to bottom, #000, transparent); z-index: 10;
}
.v-close { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.v-title { color: #fff; font-weight: 600; }
.v-counter { background: rgba(0,100,200,0.2); border: 1px solid #0088ff; border-radius: 20px; padding: 4px 12px; font-size: 13px; color: #88ccff; }

.v-img { max-width: 100%; max-height: 100%; object-fit: contain; }

.v-nav { width: 48px; height: 48px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid #0088ff; color: #88ccff; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.v-nav:disabled { opacity: 0.3; }
.v-strip { flex: 1; display: flex; gap: 6px; overflow-x: auto; padding: 0 4px; scrollbar-width: thin; }
.v-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; border: 2px solid transparent; opacity: 0.5; cursor: pointer; }
.v-thumb.active { opacity: 1; border-color: #0088ff; transform: scale(1.1); }

.modal-overlay {

  display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s;

}
.modal-actions { display: flex; gap: 10px; margin-top: auto; }
.btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 16px; }

.bottom-nav {

.logout-btn {

<body>

<!-- إطار وشرر وكلمات (تظهر دائماً) -->
<div class="fire-frame"></div>
<div id="loader"></div>
<div id="toast"></div>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-header">
      <h2>RX__DZ</h2>
      <p>🔐 دخول آمن</p>
    </div>
    <form id="loginForm" class="login-form">

<!-- التطبيق الرئيسي (مخفي حتى المصادقة) -->
<div id="mainApp" class="main-app" style="display: none;">
  <!-- هيدر مع زر تسجيل الخروج -->

    <button id="headerLogoutBtn" class="logout-btn">🚪 تسجيل الخروج</button>
  </div>
  
  <div class="app-container">
    <!-- صفحة المحادثة -->
    <div id="chatPage" class="page active">
      <div class="chat-header">
        <h1>RX__DZ</h1>
        <p>أهلاً بك في البث المباشر</p>
      </div>
      <div class="data-card">
        <div class="info-row"><span>ID :</span> <span class="rainbow">RD714083</span></div>
        <div class="info-row"><span>PASS :</span> <span class="rainbow">1234</span></div>
      </div>
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="اكتب هنا..."></textarea>
      </div>
      <div class="font-ctrl">
        <button id="fontBtn">⚙️</button>
        <div id="fontPanel" class="font-panel">
          <div class="font-prev" id="fontPrev">نص تجريبي</div>
          <div class="track" id="track"><div class="handle" id="handle"></div></div>
          <div class="size-txt" id="sizeTxt">17px</div>
        </div>
      </div>
      <div style="height: 200px;"></div>
    </div>

    <!-- صفحة المعرض -->
    <div id="galleryPage" class="page">
      <div class="gallery-header">
        <span class="gallery-title">RXDZ</span>
        <span class="gallery-badge" id="groupCount">0 مجموعة</span>
      </div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📸</div>
        <div class="empty-title">المعرض فارغ</div>
        <div class="empty-sub">اضغط على ＋ لإنشاء مجموعة جديدة</div>
      </div>
      <div id="cardsGrid" class="grid-2" style="display: none;"></div>
      <button class="fab-create" id="createGroupBtn"><span>＋</span> مجموعة جديدة</button>
    </div>
  </div>

  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item" data-page="chat"><span>💬</span> محادثة</button>
    <button class="nav-item" data-page="gallery"><span>🖼️</span> معرض</button>
  </nav>

  <button class="toggle-nav-btn" id="toggleNavBtn">👁️</button>

  <input type="file" id="singleImageInput" accept="image/*" style="display:none;">

  <div class="modal-overlay" id="groupModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">إنشاء مجموعة</div>
      <input type="text" class="group-name-input" id="groupNameInput" placeholder="اسم المجموعة (اختياري)" maxlength="40">
      <div class="preview-container">
        <div class="preview-grid" id="previewGrid"></div>
        <div class="empty-preview-msg" id="emptyPreviewMsg">لا توجد صور بعد. اضغط "إضافة صورة"</div>
      </div>
      <div class="add-image-btn" id="addImageBtn"><span>🖼️</span> إضافة صورة</div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveGroupBtn">حفظ</button>
        <button class="btn btn-secondary" id="cancelGroupBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <div class="v-header">
      <button class="v-close" id="vClose">✕</button>
      <span class="v-title" id="vTitle"></span>
      <span class="v-counter" id="vCnt"></span>
    </div>
    <div class="v-stage" id="vstage"><img class="v-img" id="vImg" src="" alt=""></div>
    <div class="v-footer">
      <button class="v-nav" id="prevBtn">→</button>
      <div class="v-strip" id="vStrip"></div>
      <button class="v-nav" id="nextBtn">←</button>
    </div>
  </div>
</div>

<script>
/* ============================================
   الجزء 1: نظام المصادقة الآمن
============================================ */
// بيانات الدخول المشفرة (Base64) - TEST DZ COD / DzARK200$$
const ENCODED_USERNAME = "VEVTVCBEWiBDT0Q=";
const ENCODED_PASSWORD = "RHpBUksyMDAkJA==";

// عناصر DOM
const loginScreen = document.getElementById('loginScreen');
const mainApp = document.getElementById('mainApp');
const loginForm = document.getElementById('loginForm');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const togglePassBtn = document.getElementById('togglePassword');
const loginBtn = document.getElementById('loginBtn');
const loginMessage = document.getElementById('loginMessage');
const lockoutTimerDiv = document.getElementById('lockoutTimer');
const headerLogoutBtn = document.getElementById('headerLogoutBtn');

// حالة الأمان
let failedAttempts = 0;
let lockoutUntil = null;
let inactivityTimer = null;
const MAX_ATTEMPTS = 3;
const LOCKOUT_DURATION = 30; // ثانية
const SESSION_TIMEOUT = 120; // ثانيتين

// دوال Base64
function base64Encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

// إدارة الجلسة
function setSession(active = true) {
  if (active) {
    sessionStorage.setItem('auth', 'true');
    sessionStorage.setItem('username', 'TEST DZ COD');
    updateActivity();
  } else {
    sessionStorage.removeItem('auth');
    sessionStorage.removeItem('username');
    sessionStorage.removeItem('lastActivity');
  }
}
function updateActivity() {
  sessionStorage.setItem('lastActivity', Date.now().toString());
}
function isSessionValid() {
  if (sessionStorage.getItem('auth') !== 'true') return false;
  const last = parseInt(sessionStorage.getItem('lastActivity') || '0');
  return (Date.now() - last) < (SESSION_TIMEOUT * 1000);
}
function resetInactivityTimer() {
  updateActivity();
  if (inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => {
    performLogout('انتهت الجلسة بسبب عدم النشاط.');
  }, SESSION_TIMEOUT * 1000);
}
function performLogout(msg = 'تم تسجيل الخروج.') {
  setSession(false);
  if (inactivityTimer) clearTimeout(inactivityTimer);
  loginScreen.classList.remove('hidden');
  mainApp.style.display = 'none';
  loginMessage.textContent = msg;
  loginMessage.style.color = '#ff5577';
  // إعادة تعيين واجهة تسجيل الدخول
  usernameInput.value = '';
  passwordInput.value = '';
  updateLockoutUI();
}

// الحماية من القوة الغاشمة
function loadLockoutState() {
  const stored = localStorage.getItem('rx_lockoutUntil');
  if (stored) {
    lockoutUntil = parseInt(stored);
    if (Date.now() >= lockoutUntil) {
      lockoutUntil = null; localStorage.removeItem('rx_lockoutUntil');
      failedAttempts = 0;
    } else {
      failedAttempts = MAX_ATTEMPTS;
    }
  } else {
    lockoutUntil = null;
  }
  if (!lockoutUntil) {
    failedAttempts = parseInt(localStorage.getItem('rx_failedAttempts') || '0');
  }
}
function incrementFailedAttempts() {
  failedAttempts++;
  localStorage.setItem('rx_failedAttempts', failedAttempts);
  if (failedAttempts >= MAX_ATTEMPTS) {
    lockoutUntil = Date.now() + (LOCKOUT_DURATION * 1000);
    localStorage.setItem('rx_lockoutUntil', lockoutUntil);
    startLockoutCountdown();
  }
}
function clearFailedAttempts() {
  failedAttempts = 0; localStorage.removeItem('rx_failedAttempts');
  lockoutUntil = null; localStorage.removeItem('rx_lockoutUntil');
}
function isLockedOut() {
  if (!lockoutUntil) return false;
  if (Date.now() >= lockoutUntil) {
    lockoutUntil = null; localStorage.removeItem('rx_lockoutUntil');
    failedAttempts = 0; localStorage.setItem('rx_failedAttempts', '0');
    return false;
  }
  return true;
}
function getLockoutRemaining() {
  if (!lockoutUntil) return 0;
  return Math.max(0, Math.ceil((lockoutUntil - Date.now()) / 1000));
}
let countdownInterval = null;
function startLockoutCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const rem = getLockoutRemaining();
    if (rem <= 0) {
      clearInterval(countdownInterval); countdownInterval = null;
      lockoutTimerDiv.textContent = ''; loginBtn.disabled = false;
      loginMessage.textContent = '';
      lockoutUntil = null; localStorage.removeItem('rx_lockoutUntil');
      failedAttempts = 0; localStorage.setItem('rx_failedAttempts', '0');
    } else {
      lockoutTimerDiv.textContent = `⏳ محظور لمدة ${rem} ثانية`;
      loginBtn.disabled = true;
    }
  }, 200);
}
function updateLockoutUI() {
  if (isLockedOut()) {
    loginBtn.disabled = true;
    lockoutTimerDiv.textContent = `⏳ محظور لمدة ${getLockoutRemaining()} ثانية`;
    startLockoutCountdown();
  } else {
    loginBtn.disabled = false;
    lockoutTimerDiv.textContent = '';
  }
}

// معالجة تسجيل الدخول
loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  if (isLockedOut()) { updateLockoutUI(); return; }
  
  const user = usernameInput.value.trim();
  const pass = passwordInput.value;
  if (!user || !pass) { loginMessage.textContent = 'الرجاء إدخال البيانات'; return; }
  
  const encodedUser = base64Encode(user);
  const encodedPass = base64Encode(pass);
  
  if (encodedUser === ENCODED_USERNAME && encodedPass === ENCODED_PASSWORD) {
    clearFailedAttempts();
    setSession(true);
    loginScreen.classList.add('hidden');
    mainApp.style.display = 'flex';
    loginMessage.textContent = '';
    // بدء جلسة التطبيق الرئيسي
    resetInactivityTimer();
    // تحميل المعرض إذا لزم
    if (typeof loadGroups === 'function') loadGroups();
    switchPage('chat');
  } else {
    incrementFailedAttempts();
    const remaining = MAX_ATTEMPTS - failedAttempts;
    if (failedAttempts >= MAX_ATTEMPTS) {
      updateLockoutUI();
      loginMessage.textContent = 'تم قفل تسجيل الدخول مؤقتاً.';
    } else {
      loginMessage.textContent = `بيانات غير صحيحة. ${remaining} محاولات متبقية.`;
    }
    passwordInput.value = '';
  }
});

// إظهار/إخفاء كلمة المرور
togglePassBtn.addEventListener('click', () => {
  const type = passwordInput.type === 'password' ? 'text' : 'password';
  passwordInput.type = type;
  togglePassBtn.textContent = type === 'password' ? '👁️' : '🙈';
});

// تسجيل الخروج من الهيدر
headerLogoutBtn.addEventListener('click', () => performLogout('تم تسجيل الخروج.'));

// مراقبة النشاط
['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(ev => {
  document.addEventListener(ev, () => {
    if (sessionStorage.getItem('auth') === 'true') resetInactivityTimer();
  });
});

// التحقق من الجلسة عند التحميل
window.addEventListener('load', () => {
  loadLockoutState();
  if (isSessionValid()) {
    loginScreen.classList.add('hidden');
    mainApp.style.display = 'flex';
    resetInactivityTimer();
    if (typeof loadGroups === 'function') loadGroups();
    switchPage('chat');
  } else {
    setSession(false);
    loginScreen.classList.remove('hidden');
    mainApp.style.display = 'none';
    updateLockoutUI();
  }
  // بدء تأثيرات الخلفية
  startBackgroundEffects();
});

/* ============================================
   الجزء 2: منطق التطبيق الأصلي (RX__DZ)
   (تم تعديله ليعمل بعد المصادقة)
============================================ */
// تعريف المتغيرات العامة
let groups = [], tempImages = [], curGroup = null, curIdx = 0;
let db = null;
const DB_NAME = 'GalleryDB', DB_VER = 1, STORE = 'groups';

// تأثيرات الخلفية (شرر وكلمات)
function startBackgroundEffects() {
  setInterval(() => {
    const s = document.createElement('div'); s.className = 'spark';
    s.style.left = Math.random() * 100 + '%';
    s.style.width = s.style.height = (Math.random() * 3 + 2) + 'px';
    s.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    document.body.appendChild(s); setTimeout(() => s.remove(), 3500);
  }, 150);
  
  const msgs = ["👆 لا تنسَ تكبيس اللايك", "🔔 فعّل المتابعة", "📢 انشر البث", "💬 تفاعل مع المنشورات", "🎁 من يطبق الشروط يحصل على هدية", "🚀 شارك للترند", "👑 احصل على VIP", "❤️ الدعم يرفع الحساب", "📈 اضغط لزيادة التفاعل"];
  setInterval(() => {
    const el = document.createElement('div'); el.className = 'floater';
    el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    el.style.left = Math.random() * 90 + 5 + '%';
    const d = Math.random() * 6 + 9; el.style.animationDuration = d + 's';
    document.body.appendChild(el); setTimeout(() => el.remove(), d * 1000);
  }, 2200);
}

// التنقل بين الصفحات
const pages = { chat: document.getElementById('chatPage'), gallery: document.getElementById('galleryPage') };
const navItems = document.querySelectorAll('.nav-item');
const bottomNav = document.getElementById('bottomNav');
const toggleNavBtn = document.getElementById('toggleNavBtn');

function switchPage(pageId) {
  Object.values(pages).forEach(p => p.classList.remove('active'));
  pages[pageId].classList.add('active');
  navItems.forEach(item => item.classList.toggle('active', item.dataset.page === pageId));
  if (pageId === 'gallery') renderGroups();
}
navItems.forEach(item => item.addEventListener('click', () => switchPage(item.dataset.page)));

toggleNavBtn.addEventListener('click', () => {
  bottomNav.classList.toggle('hidden');
  toggleNavBtn.textContent = bottomNav.classList.contains('hidden') ? '👁️‍🗨️' : '👁️';
});

// التحكم بحجم الخط
const ft = document.getElementById('fontBtn'), fp = document.getElementById('fontPanel'),
      tr = document.getElementById('track'), hd = document.getElementById('handle'),
      fv = document.getElementById('fontPrev'), st = document.getElementById('sizeTxt'),
      inp = document.getElementById('chatInput');
let cur = 17, mn = 12, mx = 26;
ft.onclick = e => { e.stopPropagation(); fp.classList.toggle('show'); ft.classList.toggle('active'); };
document.addEventListener('click', e => { if (!fp.contains(e.target) && e.target !== ft) { fp.classList.remove('show'); ft.classList.remove('active'); } });
let drag = false;
function upd(y) { const r = tr.getBoundingClientRect(); let p = 1 - (y - r.top) / r.height; p = Math.max(0, Math.min(1, p)); cur = Math.round(mn + p * (mx - mn)); apply(); }
function apply() { const px = cur + 'px'; fv.style.fontSize = px; inp.style.fontSize = px; st.textContent = px; hd.style.bottom = ((cur - mn) / (mx - mn) * 46) + 'px'; }
tr.addEventListener('pointerdown', e => { drag = true; tr.setPointerCapture(e.pointerId); upd(e.clientY); });
tr.addEventListener('pointermove', e => { if (drag) upd(e.clientY); });
tr.addEventListener('pointerup', () => drag = false);
apply();

// IndexedDB
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains(STORE)) e.target.result.createObjectStore(STORE, { keyPath: 'id' }); };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
const dbAll = () => new Promise((r, j) => { const q = db.transaction(STORE, 'readonly').objectStore(STORE).getAll(); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error); });
const dbPut = item => new Promise((r, j) => { const q = db.transaction(STORE, 'readwrite').objectStore(STORE).put(item); q.onsuccess = () => r(); q.onerror = () => j(q.error); });
const dbDel = id => new Promise((r, j) => { const q = db.transaction(STORE, 'readwrite').objectStore(STORE).delete(id); q.onsuccess = () => r(); q.onerror = () => j(q.error); });

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2600); }
function setLoader(p) { const l = document.getElementById('loader'); l.style.width = p + '%'; if (p >= 100) setTimeout(() => l.style.width = '0%', 300); }

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function loadGroups() {
  try { setLoader(30); await openDB(); groups = await dbAll(); setLoader(70); renderGroups(); setLoader(100); }
  catch (e) { toast('خطأ في تحميل المعرض'); }
}
async function saveGroup(group) { await dbPut(group); groups = groups.filter(g => g.id !== group.id); groups.push(group); renderGroups(); toast('تم حفظ المجموعة'); }
async function deleteGroup(id) { await dbDel(id); groups = groups.filter(g => g.id !== id); renderGroups(); toast('تم الحذف'); }

function renderGroups() {
  const grid = document.getElementById('cardsGrid'), empty = document.getElementById('emptyState'), badge = document.getElementById('groupCount');
  const total = groups.length; badge.textContent = total + ' ' + (total === 1 ? 'مجموعة' : 'مجموعات');
  if (total === 0) { empty.style.display = 'block'; grid.style.display = 'none'; return; }
  empty.style.display = 'none'; grid.style.display = 'grid';
  let html = '';
  groups.forEach(g => {
    const name = g.name || 'مجموعة', count = g.images.length, first = g.images[0] || '';
    html += `<div class="card" data-id="${g.id}"><div class="tw">${first ? `<img class="card-thumb" src="${first}">` : `<div class="card-ph" style="display:flex;align-items:center;justify-content:center;height:100%;">🖼️</div>`}</div><div class="card-body"><div class="card-name">${name}</div><div class="card-meta">${count} صورة</div></div><span class="card-badge">${count}</span><span class="card-del" data-del="${g.id}">🗑️</span></div>`;
  });
  grid.innerHTML = html;
  document.querySelectorAll('.card').forEach(c => { c.addEventListener('click', e => { if (!e.target.classList.contains('card-del')) openViewer(c.dataset.id); }); });
  document.querySelectorAll('.card-del').forEach(d => { d.addEventListener('click', e => { e.stopPropagation(); if (confirm('حذف المجموعة؟')) deleteGroup(d.dataset.del); }); });
}

// إنشاء مجموعة
const modal = document.getElementById('groupModal'), nameInp = document.getElementById('groupNameInput'),
      previewGrid = document.getElementById('previewGrid'), emptyMsg = document.getElementById('emptyPreviewMsg'),
      addBtn = document.getElementById('addImageBtn'), singleInp = document.getElementById('singleImageInput'),
      saveBtn = document.getElementById('saveGroupBtn'), cancelBtn = document.getElementById('cancelGroupBtn'),
      createBtn = document.getElementById('createGroupBtn');

function closeModal() { modal.classList.remove('open'); tempImages = []; }
createBtn.addEventListener('click', () => { tempImages = []; nameInp.value = ''; updatePreview(); modal.classList.add('open'); });
cancelBtn.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

function updatePreview() {
  previewGrid.innerHTML = '';
  if (tempImages.length === 0) { emptyMsg.style.display = 'block'; previewGrid.style.display = 'none'; return; }
  emptyMsg.style.display = 'none'; previewGrid.style.display = 'grid';
  tempImages.forEach((url, i) => {
    const div = document.createElement('div'); div.className = 'preview-item';
    div.innerHTML = `<img src="${url}"><span class="preview-del" data-index="${i}">✕</span>`;
    previewGrid.appendChild(div);
  });
  document.querySelectorAll('.preview-del').forEach(b => { b.addEventListener('click', e => { e.stopPropagation(); tempImages.splice(b.dataset.index, 1); updatePreview(); }); });
}
addBtn.addEventListener('click', () => { singleInp.value = ''; singleInp.click(); });
singleInp.addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  setLoader(20);
  try { const b64 = await fileToBase64(f); tempImages.push(b64); updatePreview(); toast('تمت إضافة الصورة'); }
  catch (err) { toast('فشل تحميل الصورة'); }
  setLoader(100);
});
saveBtn.addEventListener('click', async () => {
  if (!tempImages.length) { toast('أضف صورة واحدة على الأقل'); return; }
  const group = { id: Date.now().toString(36) + Math.random().toString(36), name: nameInp.value.trim() || 'مجموعة ' + new Date().toLocaleDateString('ar'), images: tempImages.slice(), createdAt: Date.now() };
  await saveGroup(group); closeModal();
});

// عارض الصور
const viewer = document.getElementById('viewer'), vImg = document.getElementById('vImg'), vTitle = document.getElementById('vTitle'),
      vCnt = document.getElementById('vCnt'), vStrip = document.getElementById('vStrip'), prevBtn = document.getElementById('prevBtn'),
      nextBtn = document.getElementById('nextBtn'), vClose = document.getElementById('vClose');

function openViewer(id) {
  const g = groups.find(g => g.id === id); if (!g || !g.images.length) return;
  curGroup = g; curIdx = 0; viewer.classList.add('open'); updateViewer(); renderStrip();
}
function closeViewer() { viewer.classList.remove('open'); }
function updateViewer() {
  vImg.src = curGroup.images[curIdx]; vTitle.textContent = curGroup.name;
  vCnt.textContent = `${curIdx + 1} / ${curGroup.images.length}`;
  prevBtn.disabled = curIdx === 0; nextBtn.disabled = curIdx === curGroup.images.length - 1;
  document.querySelectorAll('.v-thumb').forEach((t, i) => t.classList.toggle('active', i === curIdx));
}
function renderStrip() {
  let html = ''; curGroup.images.forEach((src, i) => html += `<img class="v-thumb ${i === curIdx ? 'active' : ''}" src="${src}" data-idx="${i}">`);
  vStrip.innerHTML = html;
  vStrip.querySelectorAll('.v-thumb').forEach(t => t.addEventListener('click', () => { curIdx = +t.dataset.idx; updateViewer(); renderStrip(); }));
}
function nextImage() { if (curIdx < curGroup.images.length - 1) { curIdx++; updateViewer(); renderStrip(); } }
function prevImage() { if (curIdx > 0) { curIdx--; updateViewer(); renderStrip(); } }
prevBtn.addEventListener('click', prevImage); nextBtn.addEventListener('click', nextImage);
vClose.addEventListener('click', closeViewer);
viewer.addEventListener('click', e => { if (e.target === viewer) closeViewer(); });
window.addEventListener('keydown', e => { if (!viewer.classList.contains('open')) return; if (e.key === 'ArrowRight') prevImage(); else if (e.key === 'ArrowLeft') nextImage(); else if (e.key === 'Escape') closeViewer(); });
let touchX = 0; document.getElementById('vstage').addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, { passive: true });
document.getElementById('vstage').addEventListener('touchend', e => { if (!curGroup) return; const d = e.changedTouches[0].clientX - touchX; if (Math.abs(d) < 50) return; d > 0 ? prevImage() : nextImage(); });
</script>
</body>
</html>
